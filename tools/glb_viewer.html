<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRELLIS.2 GLB Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #202124;
      color: #f1f3f4;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #111315;
      border-bottom: 1px solid #34373a;
      box-sizing: border-box;
    }
    #path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c8cdd2;
    }
    model-viewer {
      width: 100%;
      height: calc(100% - 44px);
      background: #2b2d30;
    }
  </style>
</head>
<body>
  <header>
    <strong>TRELLIS.2 GLB Viewer</strong>
    <span id="path"></span>
  </header>
  <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="0.7" exposure="1" environment-image="neutral"></model-viewer>
  <script>
    const params = new URLSearchParams(location.search);
    const src = params.get("src");
    const viewer = document.getElementById("viewer");
    const path = document.getElementById("path");
    if (src) {
      viewer.src = src;
      path.textContent = decodeURIComponent(src);
    } else {
      path.textContent = "No GLB specified.";
    }
  </script>
</body>
</html>
